name: tests

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt

      - name: Run deterministic suite with coverage
        run: |
          .venv/bin/python -m pytest -q \
            --cov=src \
            --cov=tools/voip_probe \
            --cov-report=term-missing \
            --cov-fail-under=70
